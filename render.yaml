services:
  - type: web
    name: ai-meeting-assistant-backend
    runtime: docker
    plan: free
    repo: https://github.com/chiewthejared/ai-meeting-assistant
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./meetings.db
      - key: ENABLE_DIARIZATION
        value: true
      - key: WHISPER_MODEL
        value: tiny
      - key: ENABLE_CACHING
        value: true

  - type: static
    name: ai-meeting-assistant-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-meeting-assistant-backend.onrender.com