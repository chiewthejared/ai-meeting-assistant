services:
  # Backend - Docker
  - type: web
    name: ai-meeting-assistant-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./meetings.db
      - key: ENABLE_DIARIZATION
        value: true
      - key: WHISPER_MODEL
        value: tiny
      - key: ENABLE_CACHING
        value: true

  # Frontend - Static site
  - type: web
    name: ai-meeting-assistant-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-meeting-assistant-backend.onrender.com