services:
  - type: web
    name: ai-meeting-assistant-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install setuptools wheel
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11.9
    envVars:
      - key: GEMINI_API_KEY
        value: false
      - key: DATABASE_URL
        value: sqlite:///./meetings.db
      - key: ENABLE_DIARIZATION
        value: true
      - key: WHISPER_MODEL
        value: tiny
      - key: ENABLE_CACHING
        value: true